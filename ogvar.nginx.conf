# nginx site for ogvar.xyz -> varik Node app (Proof of VARIATIONAL) on localhost:3000
# Put at: /etc/nginx/sites-available/ogvar  then symlink into sites-enabled.
# This is HTTP-only; certbot --nginx will add the 443/SSL block automatically.
server {
    listen 80;
    listen [::]:80;
    server_name ogvar.xyz;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
